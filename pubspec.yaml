name: le_john_mindfulness
description: A Flutter mindfulness and wellness app with Firebase integration.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^2.24.0
  firebase_auth: ^4.14.0
  firebase_database: ^10.3.0
  firebase_storage: ^11.4.0
  firebase_messaging: ^14.6.0
  provider: ^6.0.0
  intl: ^0.19.0
  fl_chart: ^0.64.0
  uuid: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_linter:

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/sounds/
